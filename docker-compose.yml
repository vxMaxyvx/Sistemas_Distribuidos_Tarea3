services:
  redis:
    image: redis:7-alpine
    container_name: tarea3_redis
    command: >
      redis-server
      --maxmemory ${REDIS_MAXMEMORY:-200mb}
      --maxmemory-policy ${REDIS_POLICY_NATIVE:-allkeys-lru}
      --maxmemory-samples 10
      --save ""
      --appendonly no
    ports:
      - "${REDIS_PORT_HOST:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: apache/kafka:3.7.0
    container_name: tarea3_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  generador_respuestas:
    build: ./generador_respuestas
    container_name: tarea3_gen_respuestas
    environment:
      DATA_PATH: /app/data/buildings_rm.csv
      SIM_LATENCY_MIN_MS: ${SIM_LATENCY_MIN_MS:-30}
      SIM_LATENCY_MAX_MS: ${SIM_LATENCY_MAX_MS:-120}
    volumes:
      - ./data:/app/data:ro
    ports:
      - "5001:5001"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  cache_api:
    build: ./cache_api
    # Sin container_name para permitir escalamiento horizontal con --scale
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RESPONSE_GEN_URL: http://generador_respuestas:5001
      METRICAS_URL: http://metricas:5002
      CACHE_POLICY: ${CACHE_POLICY:-LRU}
      CACHE_TTL_SEC: ${CACHE_TTL_SEC:-300}
      TTL_Q1: ${TTL_Q1:-300}
      TTL_Q2: ${TTL_Q2:-300}
      TTL_Q3: ${TTL_Q3:-180}
      TTL_Q4: ${TTL_Q4:-120}
      TTL_Q5: ${TTL_Q5:-600}
      USE_KAFKA: ${USE_KAFKA:-false}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MAX_RETRIES: ${MAX_RETRIES:-3}
      RETRY_DELAY_SEC: ${RETRY_DELAY_SEC:-0.1}
    expose:
      - "5000"
    depends_on:
      redis:
        condition: service_healthy
      generador_respuestas:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  metricas:
    build: ./metricas
    container_name: tarea3_metricas
    environment:
      LATENCY_WINDOW: 5000
      SNAPSHOT_DIR: /snapshots
      CACHE_STATS_URL: http://cache_api:5000/stats
      USE_KAFKA: ${USE_KAFKA:-false}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # Tarea 3: publicacion de eventos hacia el topico dedicado de metricas.
      PUBLISH_METRICS_KAFKA: ${PUBLISH_METRICS_KAFKA:-true}
      METRICS_TOPIC: ${METRICS_TOPIC:-metrics-topic}
      METRICS_TOPIC_PARTITIONS: ${METRICS_TOPIC_PARTITIONS:-3}
    volumes:
      - ./snapshots:/snapshots
    ports:
      - "5002:5002"
    depends_on:
      cache_api:
        condition: service_healthy
      kafka:
        condition: service_healthy

  generador_trafico:
    build: ./generador_trafico
    container_name: tarea3_trafico
    environment:
      CACHE_URL: http://cache_api:5000
      USE_KAFKA: ${USE_KAFKA:-false}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "5003:5003"
    depends_on:
      cache_api:
        condition: service_healthy
      metricas:
        condition: service_started
      kafka:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Tarea 3: pipeline de observabilidad (Spark -> Elasticsearch -> Kibana)
  # ---------------------------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: tarea3_elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      bootstrap.memory_lock: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(yellow|green)\"'"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 40s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: tarea3_kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      XPACK_SECURITY_ENABLED: "false"
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q '\"level\":\"available\"' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  spark:
    build: ./spark_streaming
    container_name: tarea3_spark
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      METRICS_TOPIC: ${METRICS_TOPIC:-metrics-topic}
      ES_NODES: elasticsearch
      ES_PORT: 9200
      ES_INDEX: ${ES_INDEX:-metrics-aggregated}
      WINDOW_DURATION: ${WINDOW_DURATION:-1 minute}
      SLIDE_DURATION: ${SLIDE_DURATION:-10 seconds}
      WATERMARK: ${WATERMARK:-30 seconds}
      TRIGGER_INTERVAL: ${TRIGGER_INTERVAL:-10 seconds}
      STARTING_OFFSETS: ${STARTING_OFFSETS:-latest}
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      metricas:
        condition: service_started

volumes:
  es_data: